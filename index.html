<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بتحبني؟</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #fff0f3, #f0e6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 320px;
            max-width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }
        .cat-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        h2 {
            color: #d9383a;
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.5;
        }
        .btn-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            position: relative;
        }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, font-size 0.2s ease;
        }
        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
        }
        #no-btn {
            background-color: #e0e0e0;
            color: #666;
            position: absolute;
            left: 25px;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <img src="https://images.unsplash.com/photo-1615266508040-7c47f7339963?w=400&auto=format&fit=crop&q=80" alt="Cats" class="cat-img" id="cat-gif">
        
        <h2 id="question">رغد تحبيني لو لا ؟</h2>
        
        <div class="btn-container">
            <button id="yes-btn" onclick="selectYes()">إي</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">لا</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const catGif = document.getElementById('cat-gif');
        const question = document.getElementById('question');
        const card = document.getElementById('main-card');

        let yesScale = 1;
        let noClicks = 0;

        function moveNoButton() {
            noClicks++;
            
            let noScale = Math.max(0.2, 1 - (noClicks * 0.15));
            noBtn.style.transform = `scale(${noScale})`;
            
            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;

            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            // FIXED: Bulletproof static picture of a glowing red heart for the reveal
            catGif.src = "https://images.unsplash.com/photo-1606902960316-353ebd89d936?w=400&auto=format&fit=crop&q=80";
            
            question.innerHTML = "Asln Knt b3rf 7a t2oole eh 🤍";
            
            document.querySelector('.btn-container').style.display = 'none';
        }
    </script>
</body>
</html>
