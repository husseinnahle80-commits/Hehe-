<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بتحبني؟</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #fff0f3, #f0e6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 320px;
            max-width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }
        /* Style for the media container to keep it perfectly sized */
        .media-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cat-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        h2 {
            color: #d9383a;
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.5;
        }
        .btn-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            position: relative;
        }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, font-size 0.2s ease;
        }
        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            z-index: 10;
        }
        #no-btn {
            background-color: #e0e0e0;
            color: #666;
            position: absolute;
            left: 25px;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div class="media-container" id="media-box">
            <video class="cat-media" autoplay loop muted playsinline id="cat-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-transparent-animation-of-two-cats-carrying-a-heart-43187-large.mp4" type="video/mp4">
                <img src="https://raw.githubusercontent.com/saurabhnemade/will-you-be-my-valentine/master/public/milk-and-mocha.gif" class="cat-media" alt="Cats">
            </video>
        </div>
        
        <h2 id="question">رغد تحبيني لو لا ؟</h2>
        
        <div class="btn-container">
            <button id="yes-btn" onclick="selectYes()">إي</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">لا</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const question = document.getElementById('question');
        const mediaBox = document.getElementById('media-box');

        let yesScale = 1;
        let noClicks = 0;

        function moveNoButton() {
            noClicks++;
            
            let noScale = Math.max(0.2, 1 - (noClicks * 0.15));
            noBtn.style.transform = `scale(${noScale})`;
            
            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;

            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            // BULLETPROOF: Updates to a beautifully rendered pure CSS/SVG pulsing heart layout for the win
            mediaBox.innerHTML = `
                <svg viewBox="0 0 32 32" style="width: 100px; height: 100px; fill: #ff4d6d; animation: pulse 0.6s infinite alternate;">
                    <style>
                        @keyframes pulse {
                            from { transform: scale(1); }
                            to { transform: scale(1.15); }
                        }
                    </style>
                    <path d="M16 28.5c-.5 0-1-.2-1.4-.6l-10-10c-2.3-2.3-2.3-6.1 0-8.5 2.3-2.3 6.1-2.3 8.5 0l2.9 2.9 2.9-2.9c2.3-2.3 6.1-2.3 8.5 0 2.3 2.3 2.3 6.1 0 8.5l-10 10c-.4.4-.9.6-1.4.6z"/>
                </svg>
            `;
            
            question.innerHTML = "Asln Knt b3rf 7a t2oole eh 🤍";
            document.querySelector('.btn-container').style.display = 'none';
        }
    </script>
</body>
</html>
